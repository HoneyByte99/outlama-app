name: outlama_app
description: "Outalma — service marketplace MVP"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.0
  cloud_functions: ^5.1.0
  firebase_messaging: ^15.1.3

  # App
  go_router: ^14.2.7
  flutter_riverpod: ^2.5.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_outalma.png"
  web:
    generate: true
    image_path: "assets/images/logo_outalma.png"
    background_color: "#ffffff"
    theme_color: "#1B3A4B"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
