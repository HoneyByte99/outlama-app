name: outalma_app
description: "Outalma — service marketplace MVP"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.0
  cloud_functions: ^5.1.0
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.4
  image_picker: ^1.1.2
  connectivity_plus: ^6.1.0
  flutter_native_splash: ^2.4.3

  # Maps
  google_maps_flutter: ^2.10.0
  http: ^1.2.2
  record: ^5.2.1
  just_audio: ^0.9.40
  path_provider: ^2.1.4
  table_calendar: ^3.1.2
  intl: ^0.20.2

  # App
  go_router: ^14.2.7
  flutter_riverpod: ^2.5.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.2
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0
  geolocator: ^14.0.2
  geolocator_web: ^4.1.3

dependency_overrides:
  record_linux: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.3
  fake_cloud_firestore: ^3.0.3
  mocktail: ^1.0.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_icon_cropped.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo_icon_cropped.png"
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  web:
    generate: true
    image_path: "assets/images/logo_icon_cropped.png"
    background_color: "#ffffff"
    theme_color: "#1B3A4B"

flutter_native_splash:
  color: "#F4F7F9"
  image: assets/images/logo_icon_cropped.png
  color_dark: "#0A1A24"
  image_dark: assets/images/logo_icon_cropped.png
  android_12:
    color: "#F4F7F9"
    image: assets/images/logo_icon_cropped.png
    color_dark: "#0A1A24"
    image_dark: assets/images/logo_icon_cropped.png
  web: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
